name: Cleanup Workflow Runs

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 3 * * 0'

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs and their artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 5;
            const perPage = 100;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner,
              repo,
              per_page: perPage,
            });

            core.info(`Found ${workflows.length} workflow(s).`);

            for (const workflow of workflows) {
              core.info(`Processing workflow: ${workflow.name} (${workflow.path})`);

              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner,
                repo,
                workflow_id: workflow.id,
                per_page: perPage,
              });

              if (runs.length <= keep) {
                core.info(`Keeping all ${runs.length} run(s) for ${workflow.name}.`);
                continue;
              }

              const sortedRuns = runs.sort((a, b) => {
                return new Date(b.created_at) - new Date(a.created_at);
              });

              const runsToDelete = sortedRuns.slice(keep);
              core.info(`Deleting ${runsToDelete.length} old run(s) for ${workflow.name}.`);

              for (const run of runsToDelete) {
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id,
                  });
                  core.info(`Deleted run ${run.id} (${run.name || workflow.name}) created at ${run.created_at}.`);
                } catch (error) {
                  core.warning(`Failed to delete run ${run.id}: ${error.message}`);
                }
              }
            }
