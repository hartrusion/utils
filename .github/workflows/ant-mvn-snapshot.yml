# Builds utils with Ant and publishes the JAR as a rolling SNAPSHOT to GitHub Packages.
# No pom.xml is stored in this repository - all Maven coordinates are declared inline.
# Generated by Copilot / Claude Sonnet 4.6
name: Github Packages Snapshot

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - '**/*.yml'
      - '**/*.png'
      - '**/*.svg'
      - '**/*.xml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  ARTIFACT_ID: utils
  VERSION: 0.0.1-SNAPSHOT

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build JAR with Ant
        run: |
          ant -buildfile .github/build.xml jar \
            -Djar.name=${{ env.ARTIFACT_ID }}-${{ env.VERSION }}.jar

      - name: Publish to GitHub Packages
        run: |
          mvn deploy:deploy-file \
            -Dfile=build/jar/${{ env.ARTIFACT_ID }}-${{ env.VERSION }}.jar \
            -DgroupId=com.hartrusion \
            -DartifactId=${{ env.ARTIFACT_ID }} \
            -Dversion=${{ env.VERSION }} \
            -Dpackaging=jar \
            -DrepositoryId=github \
            -Durl=https://maven.pkg.github.com/${{ github.repository_owner }}/${{ env.ARTIFACT_ID }} \
            -DgeneratePom=true \
            -DupdateReleaseInfo=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
